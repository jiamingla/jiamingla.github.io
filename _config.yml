# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 'Elijah’s Quality Lab'
subtitle: '早上好'
description: '我會在這裡分享有關軟體測試的知識與經驗，通常是踩過的坑，畢竟AI能幫我們解決很多問題，但還是需要人們紀錄坑坑洞洞。'
keywords: testing, software testing, test automation, qa, quality assurance
author: 'Elijah Ho'
language: zh-TW
timezone: 'Asia/Taipei'

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://jiamingla.github.io
permalink: post/:urlname/
permalink_defaults:
  title: index
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render: 
  - googlebf59fe9929fd5d2f.html

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: false
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'date'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
# include:
# exclude:
# ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: keep

search:
  path: search.json
  field: post
  content: true
  format: striptags

comment:
  enable: true
  use: giscus  # 這裡指定使用 giscus

giscus:
  # 是否启用 Giscus 评论系统
  enable: true
  # 是否显示加载动画
  loading: true
  # GitHub 仓库，格式为 username/repo-name
  repo: "jiamingla/jiamingla.github.io"
  # GitHub 仓库的唯一ID
  repo_id: R_kgDOQ9s4Ng
  # GitHub Discussions 分类名称
  category: "Blog Comments"
  # Discussions 分类的唯一 ID
  category_id: DIC_kwDOQ9s4Ns4C1NAE
  # 指定 GitHub discussion 的匹配规则
  mapping: pathname
  # 是否启用严格的标题匹配
  strict: 0
  # 是否启用主帖子上的反应
  reactions_enabled: 1
  # 是否输出 discussion 的元数据
  emit_metadata: 0
  # 亮色主题
  theme: light
  # 暗色主题
  dark: dark
  # 评论区的语言
  lang: zh-TW
  # 评论输入框的位置
  input_position: bottom
  # 懒加载评论
  data_loading: lazy

# Sitemap (hexo-generator-sitemap)
# ------------------------------------------------------------
# 功能：自動產生 sitemap.xml，提交給 Google / Bing 等搜尋引擎
#       讓爬蟲知道網站有哪些頁面、何時更新，加速 SEO 收錄。
#
# 產出位置：public/sitemap.xml（執行 `hexo generate` 後）
# 線上網址：https://jiamingla.github.io/sitemap.xml
#
# 提交方式：
#   1. Google Search Console → Sitemaps → 提交 sitemap.xml
#   2. 或在 source/robots.txt 加入：Sitemap: https://jiamingla.github.io/sitemap.xml
#
# 可用選項：
#   path        sitemap 檔名／路徑（可為陣列產生多份）
#   template    自訂 XML 樣板路徑（不設則用內建）
#   rel         是否在 <head> 加入 rel="sitemap" 連結（預設 false）
#   tags        是否收錄各個 tag 頁（true 會列入每個標籤的列表頁）
#   categories  是否收錄各個 category 頁
#
# 目前設定意圖：
#   - 只收錄文章與主要頁面，不把 tag/category 列表頁塞進 sitemap，
#     避免內容稀薄（thin content）的列表頁稀釋 SEO 權重。
#   - 若想排除某篇文章，可在該文 front-matter 加 `sitemap: false`。
sitemap:
  path: sitemap.xml
  tags: false
  categories: false

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repo: https://github.com/jiamingla/jiamingla.github.io.git
  branch: gh-pages

symbols_count_time:
  symbols: true
  time: true
  total_symbols: false
  total_time: false
  exclude_codeblock: true
  awl: 2   # 中文处理速度（每分钟字数）
  wpm: 275 # 英文处理速度（每分钟字数）
